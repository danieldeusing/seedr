<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon-warm.svg" id="favicon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Seed your Coding Agents with capabilities - skills, hooks, agents, and plugins for Claude Code, Copilot, Gemini, and more" />
    <meta name="theme-color" content="#f5efe2" />
    <title>Seedr - AI Configuration Seeder</title>
    <script>
      // apply the stored theme before first paint to avoid a flash
      (() => {
        const backgrounds = {
          warm: "#f5efe2",
          green: "#020604",
          mono: "#050505",
          paper: "#fafafa",
        };
        let theme = "warm";
        try {
          const stored = localStorage.getItem("theme");
          if (stored && stored in backgrounds) theme = stored;
        } catch {}
        document.documentElement.dataset.theme = theme;
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute("content", backgrounds[theme]);
        document.getElementById("favicon")?.setAttribute("href", "/favicon-" + theme + ".svg");
        // gate for the terminal typing animation: set pre-paint so pending
        // prompts/outputs are hidden from the first frame (see index.css)
        if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          document.documentElement.classList.add("term-anim");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
